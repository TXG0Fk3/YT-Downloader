name: CI - Build and Package

on:
  workflow_dispatch:
  push:
    tags:
      - '**'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish Minimal
      run: dotnet publish YTDownloader/YTDownloader.csproj -c Release -r win-x64 --self-contained false -p:PublishProfile=win-x64.pubxml

    - name: Create Minimal Zip
      shell: pwsh
      run: |
        Compress-Archive -Path YTDownloader/bin/Release/net10.0-windows10.0.26100.0/win-x64/publish/* -DestinationPath YTDownloader.Minimal.x64.zip

    - name: Publish Full for Setup
      run: dotnet publish YTDownloader/YTDownloader.csproj -c Release -r win-x64 --self-contained true -p:PublishProfile=win-x64.pubxml

    - name: Download FFmpeg
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.7z" -OutFile ffmpeg.7z
        7z e ffmpeg.7z "*/bin/ffmpeg.exe" -o"YTDownloader/bin/Release/net10.0-windows10.0.26100.0/win-x64/publish/" -r

    - name: Compile Inno Setup
      shell: pwsh
      run: |
        & "iscc.exe" Packaging/YTDownloader.iss

    - name: Upload Minimal Zip
      uses: actions/upload-artifact@v4
      with:
        name: YTDownloader.Minimal.x64
        path: YTDownloader.Minimal.x64.zip

    - name: Upload Setup Exe
      uses: actions/upload-artifact@v4
      with:
        name: YTDownloader.Setup.x64
        path: Packaging/YTDownloader.Setup.x64*.exe